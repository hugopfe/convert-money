<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevClub - Convert Money</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <img src="assets/logo.gif" alt="logo - money convert" id="logo">
    <main>
        <section id="input">
            <label for="converting">
                Converter <b>de</b>
                <select name="converting" id="converting">
                    <option>R$ Real brasileiro</option>
                </select>
            </label>
            <label for="converted">
                Converter <b>para</b>
                <select name="converted" id="select-target-currecy">
                    <option value="dollar">US$ Dólar americano</option>
                    <option value="euro">€ Euro</option>
                    <option value="libra">£ Libra</option>
                    <option value="bitcoin">₿ Bitcoin</option>
                </select>
            </label>
            <label for="value">
                Valor
                <input type="number" name="input-currency" id="input-currency" placeholder="R$ 10.000,00">
            </label>
            <button class="convert-button">Converter</button>
        </section>

        <section id="result">
            <div class="currency-wrapper">
                <img src="assets/real.png" alt="logo moeda a converter">
                <p>Real</p>
                <p class="currency-value" id="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img src="assets/arrow.png" alt="arrow down" id="arrow">

            <div class="currency-wrapper">
                <img src="assets/dollar.png" alt="logo moeda convertida" id="currency-converted-flag">
                <p class="currency-converted-name">Dólar americano</p>
                <p class="currency-value" id="currency-value-converted">US$ 0.00</p>
            </div>
        </section>
    </main>
</body>
<script src="script.js"></script>
</html>
